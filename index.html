<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Engleza Familie — Business English</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

  <main id="screen-login" class="screen">
    <div class="card">
      <h1>Engleza Familie</h1>
      <p class="subtitle">Business English — Conversational practice</p>
      <button id="login-btn" class="btn btn-primary">Sign in with Google</button>
      <p id="login-error" class="error" hidden></p>
    </div>
  </main>

  <main id="screen-chat" class="screen" hidden>
    <header class="chat-header">
      <div>
        <strong id="current-user-name"></strong>
        <span id="current-profile-name" class="profile-tag"></span>
      </div>
      <div class="chat-header-right">
        <span id="budget-indicator" class="budget-indicator"></span>
        <button id="debug-data-btn" class="btn btn-small">Show saved data</button>
        <button id="logout-btn" class="btn btn-small">Sign out</button>
      </div>
    </header>

    <p id="budget-warning" class="banner banner-warn" hidden></p>

    <div id="chat-log" class="chat-log"></div>

    <footer class="chat-input-row">
      <textarea id="chat-input" rows="2" placeholder="Type your message in English..."></textarea>
      <button id="chat-send" class="btn btn-primary">Send</button>
    </footer>

    <pre id="debug-data-output" class="debug-output" hidden></pre>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
