<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Engleza Familie — Business English</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

  <main id="screen-login" class="screen">
    <div class="card">
      <h1>Engleza Familie</h1>
      <p class="subtitle">Business English — Conversational practice</p>
      <button id="login-btn" class="btn btn-primary">Sign in with Google</button>
      <p id="login-error" class="error" hidden></p>
    </div>
  </main>

  <main id="screen-chat" class="screen" hidden>
    <header class="chat-header">
      <div>
        <strong id="current-user-name"></strong>
        <span id="current-profile-name" class="profile-tag"></span>
      </div>
      <div class="chat-header-center">
        <label for="scenario-select" class="scenario-label">Practice:</label>
        <select id="scenario-select">
          <option value="">Free conversation</option>
        </select>
      </div>
      <div class="chat-header-right">
        <span id="budget-indicator" class="budget-indicator"></span>
        <select id="voice-gender-select" class="voice-gender-select" title="Interlocutor voice">
          <option value="female">👩 Female voice</option>
          <option value="male">👨 Male voice</option>
        </select>
        <button id="tts-mute-btn" class="btn btn-small" aria-pressed="false">🔊 Voice on</button>
        <button id="debug-data-btn" class="btn btn-small">Show saved data</button>
        <button id="logout-btn" class="btn btn-small">Sign out</button>
      </div>
    </header>

    <div id="scenario-documents" class="scenario-documents" hidden>
      <div class="scenario-documents-summary">
        <span id="scenario-documents-label"></span>
        <button id="scenario-documents-manage-btn" class="btn btn-small">Manage documents</button>
      </div>

      <div id="scenario-documents-panel" class="scenario-documents-panel" hidden>
        <ul id="scenario-documents-list" class="scenario-documents-list"></ul>
        <input id="scenario-documents-file-input" type="file" multiple
               accept=".pdf,.png,.jpg,.jpeg,.webp,.txt" />
        <p class="hint">PDF, photos/screenshots, or .txt only — up to 4 files, 4 MB each.
           Word docs: please save as PDF first (File → Save As → PDF in Word).</p>
        <div class="scenario-documents-actions">
          <button id="scenario-documents-save-btn" class="btn btn-primary">Save documents</button>
          <button id="scenario-documents-cancel-btn" class="btn btn-small">Cancel</button>
        </div>
        <p id="scenario-documents-status" class="hint" hidden></p>
      </div>
    </div>

    <p id="budget-warning" class="banner banner-warn" hidden></p>

    <div id="chat-log" class="chat-log"></div>

    <footer class="chat-input-row">
      <button id="mic-btn" class="btn btn-small" hidden>🎤</button>
      <textarea id="chat-input" rows="2" placeholder="Type your message in English..."></textarea>
      <button id="chat-send" class="btn btn-primary">Send</button>
    </footer>

    <pre id="debug-data-output" class="debug-output" hidden></pre>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
